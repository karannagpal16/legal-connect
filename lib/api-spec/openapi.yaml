openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: RNA Legal Connect - Rishika Nagpal & Associates
servers:
  - url: /api
tags:
  - name: health
  - name: users
  - name: cases
  - name: tasks
  - name: intern-quests
  - name: analytics
  - name: bookings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: List all cases
      parameters:
        - name: today
          in: query
          required: false
          schema:
            type: boolean
          description: Filter cases with next_date = today
      responses:
        "200":
          description: List of cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Case"
    post:
      operationId: createCase
      tags: [cases]
      summary: Create a new case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseRequest"
      responses:
        "201":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"

  /cases/{id}:
    get:
      operationId: getCase
      tags: [cases]
      summary: Get a case by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCase
      tags: [cases]
      summary: Update a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaseRequest"
      responses:
        "200":
          description: Case updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
    delete:
      operationId: deleteCase
      tags: [cases]
      summary: Delete a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all proxy tasks
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a new proxy task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/{id}/accept:
    post:
      operationId: acceptTask
      tags: [tasks]
      summary: Accept a proxy task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /intern-quests:
    get:
      operationId: listInternQuests
      tags: [intern-quests]
      summary: List all intern quests
      responses:
        "200":
          description: List of intern quests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InternQuest"
    post:
      operationId: createInternQuest
      tags: [intern-quests]
      summary: Create a new intern quest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInternQuestRequest"
      responses:
        "201":
          description: Quest created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternQuest"

  /intern-quests/{id}:
    put:
      operationId: updateInternQuest
      tags: [intern-quests]
      summary: Update an intern quest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInternQuestRequest"
      responses:
        "200":
          description: Quest updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternQuest"
    delete:
      operationId: deleteInternQuest
      tags: [intern-quests]
      summary: Delete an intern quest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all client bookings
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Book a lawyer consultation (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    put:
      operationId: updateBooking
      tags: [bookings]
      summary: Update a booking status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingRequest"
      responses:
        "200":
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    delete:
      operationId: deleteBooking
      tags: [bookings]
      summary: Delete a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /analytics/revenue:
    get:
      operationId: getRevenueAnalytics
      tags: [analytics]
      summary: Founder revenue analytics
      responses:
        "200":
          description: Revenue analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueAnalytics"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        barId:
          type: string
          nullable: true
        email:
          type: string
        phone:
          type: string
          nullable: true
        role:
          type: string
          enum: [Admin, Associate, Intern, Proxy]
        locationBase:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, createdAt]

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        barId:
          type: string
          nullable: true
        email:
          type: string
        phone:
          type: string
          nullable: true
        role:
          type: string
          enum: [Admin, Associate, Intern, Proxy]
        locationBase:
          type: string
          nullable: true
      required: [name, email, role]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        barId:
          type: string
          nullable: true
        email:
          type: string
        phone:
          type: string
          nullable: true
        role:
          type: string
          enum: [Admin, Associate, Intern, Proxy]
        locationBase:
          type: string
          nullable: true

    Case:
      type: object
      properties:
        id:
          type: integer
        caseTitle:
          type: string
        caseNumber:
          type: string
        courtName:
          type: string
        courtRoomNo:
          type: string
          nullable: true
        judgeName:
          type: string
          nullable: true
        nextDate:
          type: string
          nullable: true
        status:
          type: string
          enum: [Active, Pending, Disposed, Adjourned]
        createdAt:
          type: string
          format: date-time
      required: [id, caseTitle, caseNumber, courtName, status, createdAt]

    CreateCaseRequest:
      type: object
      properties:
        caseTitle:
          type: string
        caseNumber:
          type: string
        courtName:
          type: string
        courtRoomNo:
          type: string
          nullable: true
        judgeName:
          type: string
          nullable: true
        nextDate:
          type: string
          nullable: true
        status:
          type: string
          enum: [Active, Pending, Disposed, Adjourned]
      required: [caseTitle, caseNumber, courtName, status]

    UpdateCaseRequest:
      type: object
      properties:
        caseTitle:
          type: string
        caseNumber:
          type: string
        courtName:
          type: string
        courtRoomNo:
          type: string
          nullable: true
        judgeName:
          type: string
          nullable: true
        nextDate:
          type: string
          nullable: true
        status:
          type: string
          enum: [Active, Pending, Disposed, Adjourned]

    Task:
      type: object
      properties:
        id:
          type: integer
        taskDescription:
          type: string
        caseRef:
          type: integer
          nullable: true
        taskType:
          type: string
          enum: [Pass-over, Adjournment, Evidence, Arguments, Other]
          nullable: true
        fee:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        assignedToId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [Open, Accepted, Completed, Cancelled]
        createdAt:
          type: string
          format: date-time
      required: [id, taskDescription, status, createdAt]

    CreateTaskRequest:
      type: object
      properties:
        taskDescription:
          type: string
        caseRef:
          type: integer
          nullable: true
        taskType:
          type: string
          enum: [Pass-over, Adjournment, Evidence, Arguments, Other]
          nullable: true
        fee:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        assignedToId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [Open, Accepted, Completed, Cancelled]
      required: [taskDescription, status]

    UpdateTaskRequest:
      type: object
      properties:
        taskDescription:
          type: string
        caseRef:
          type: integer
          nullable: true
        taskType:
          type: string
          enum: [Pass-over, Adjournment, Evidence, Arguments, Other]
          nullable: true
        fee:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        assignedToId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [Open, Accepted, Completed, Cancelled]

    InternQuest:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        xpPoints:
          type: integer
        deadline:
          type: string
          nullable: true
        status:
          type: string
          enum: [Open, In Progress, Completed]
        createdAt:
          type: string
          format: date-time
      required: [id, title, description, xpPoints, status, createdAt]

    CreateInternQuestRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        xpPoints:
          type: integer
        deadline:
          type: string
          nullable: true
        status:
          type: string
          enum: [Open, In Progress, Completed]
      required: [title, description, xpPoints, status]

    UpdateInternQuestRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        xpPoints:
          type: integer
        deadline:
          type: string
          nullable: true
        status:
          type: string
          enum: [Open, In Progress, Completed]

    RevenueAnalytics:
      type: object
      properties:
        totalActiveCases:
          type: integer
        totalManagedRevenue:
          type: number
        completedProxyTasks:
          type: integer
        marketplaceProfit:
          type: number
        singaporeGoal:
          type: number
        singaporeProgress:
          type: number
        totalUsers:
          type: integer
        openProxyTasks:
          type: integer
      required:
        - totalActiveCases
        - totalManagedRevenue
        - completedProxyTasks
        - marketplaceProfit
        - singaporeGoal
        - singaporeProgress
        - totalUsers
        - openProxyTasks

    Booking:
      type: object
      properties:
        id:
          type: integer
        clientName:
          type: string
        clientEmail:
          type: string
        clientPhone:
          type: string
        legalIssueType:
          type: string
          enum: [Criminal, Civil, Family, Property, Corporate, Labour, Other]
        preferredLawyer:
          type: string
          nullable: true
        preferredDate:
          type: string
        preferredTime:
          type: string
          enum: ["9:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "2:00 PM", "3:00 PM", "4:00 PM", "5:00 PM"]
        briefDescription:
          type: string
          nullable: true
        status:
          type: string
          enum: [Pending, Confirmed, Cancelled, Completed]
        createdAt:
          type: string
          format: date-time
      required: [id, clientName, clientEmail, clientPhone, legalIssueType, preferredDate, preferredTime, status, createdAt]

    CreateBookingRequest:
      type: object
      properties:
        clientName:
          type: string
        clientEmail:
          type: string
        clientPhone:
          type: string
        legalIssueType:
          type: string
          enum: [Criminal, Civil, Family, Property, Corporate, Labour, Other]
        preferredLawyer:
          type: string
          nullable: true
        preferredDate:
          type: string
        preferredTime:
          type: string
          enum: ["9:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "2:00 PM", "3:00 PM", "4:00 PM", "5:00 PM"]
        briefDescription:
          type: string
          nullable: true
        status:
          type: string
          enum: [Pending, Confirmed, Cancelled, Completed]
      required: [clientName, clientEmail, clientPhone, legalIssueType, preferredDate, preferredTime, status]

    UpdateBookingRequest:
      type: object
      properties:
        clientName:
          type: string
        clientEmail:
          type: string
        clientPhone:
          type: string
        legalIssueType:
          type: string
          enum: [Criminal, Civil, Family, Property, Corporate, Labour, Other]
        preferredLawyer:
          type: string
          nullable: true
        preferredDate:
          type: string
        preferredTime:
          type: string
          enum: ["9:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "2:00 PM", "3:00 PM", "4:00 PM", "5:00 PM"]
        briefDescription:
          type: string
          nullable: true
        status:
          type: string
          enum: [Pending, Confirmed, Cancelled, Completed]
